<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2b48"/>
      <stop offset="55%" stop-color="#031632"/>
      <stop offset="100%" stop-color="#5d4201"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#c5a059" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#c5a059" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
