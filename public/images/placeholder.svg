        fill="#ffffff" opacity="0.55" letter-spacing="0.05em">
    Grafta Clinic
  </text>
  <text x="50%" y="58%" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-size="14"
        fill="#c5a059" opacity="0.8" letter-spacing="0.3em">
